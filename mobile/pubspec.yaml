name: mobile
description: FastAPI Template mobile app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  
  # Navigation
  go_router: ^17.1.0
  
  # UI
  flutter_animate: ^4.5.2
  google_fonts: ^8.0.2
  cached_network_image: ^3.3.1
  
  # Networking
  dio: ^5.5.0
  
  # Analytics
  posthog_flutter: ^5.18.0
  
  # Payments / Web
  webview_flutter: ^4.10.0
  url_launcher: ^6.3.0
  web: ^1.1.0
  
  # Storage
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^10.0.0
  
  # Utilities
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0
  intl: ^0.20.0
  flutter_dotenv: ^6.0.0
  
  # NEPSIM specific UI
  fl_chart: ^1.1.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10
  lottie: ^3.1.2
  flutter_widget_from_html: ^0.17.1
  syncfusion_flutter_charts: ^32.2.8


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
  assets:
    - .env


